---
base_image: ubuntu:26.04

labels:
  maintainer: "Maciej Rachuna <rachuna.maciej@gmail.com>"
  description: Kontener z narzędziem Ansible i Molecule
  image_source: "https://gitlab.com/dev.rachuna/artifacts/containers/ansible"

env:
  DEBIAN_FRONTEND: noninteractive
  TF_IN_AUTOMATION: "true"
  LANG: C.UTF-8

before_build_commands: []

packages:
  - bash
  - ansible-lint
  - curl
  - git
  - jq
  - openssl
  - openssh-client
  - python-is-python3
  - python3
  - ca-certificates
  - python3-pip
  - python3-setuptools
  - python3-venv
  - sudo
  - software-properties-common
  - yq
  - zip
  - sshpass

custom_repos: []

extra_commands:
  - |
    pip3 install --no-cache-dir --break-system-packages --ignore-installed \
        ansible \
        ansible-core \
        ansible-lint \
        hvac \
        molecule \
        molecule-plugins \
        molecule-proxmox \
        pytest-testinfra \
        requests \
        testinfra
  - ansible --version

copy: []

user:
  name: nonroot
  shell: /bin/bash
  home: /home/nonroot
  uid: 10000

entrypoint: null
cmd: "/bin/bash"
